<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast Any Moves Ltd – Instant Moving Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f7fb;
margin:0;
}

.container{
max-width:800px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

h1{
text-align:center;
color:#0B4DBA;
margin-bottom:5px;
}

h2{
text-align:center;
font-weight:400;
color:#555;
margin-bottom:25px;
}

label{
font-weight:600;
display:block;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:6px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

#quoteBtn{background:#0B4DBA;color:white;}
#whatsappBtn{background:#25D366;color:white;}
#emailBtn{background:#007bff;color:white;}

.result{
margin-top:25px;
padding:20px;
background:#eef5ff;
border-radius:8px;
white-space:pre-line;
line-height:1.5;
}

</style>
</head>

<body>

<div class="container">

<h1>Fast Any Moves Ltd</h1>
<h2>Instant Moving Quote – London Man & Van</h2>

<form id="quoteForm">

<label>Name *</label>
<input type="text" id="name" required>

<label>Email *</label>
<input type="email" id="email" required>

<label>Phone *</label>
<input type="text" id="phone" required>

<label>Moving Date & Time *</label>
<input type="datetime-local" id="moveDate" required>

<label>Do you need help with loading and unloading? *</label>
<select id="service" required>
<option value="">Select</option>
<option value="35">No help required + Medium Van</option>
<option value="40">1 Man + Medium Van</option>
<option value="70">2 Men + Medium Van</option>
<option value="100">3 Men + Medium Van</option>
</select>

<label>Collection Address *</label>
<input type="text" id="collection" required>

<label>Collection Stairs</label>
<select id="stairsCollection">
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<label>Via Address (optional)</label>
<input type="text" id="via">

<label>Via Stairs</label>
<select id="stairsVia">
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<label>Delivery Address *</label>
<input type="text" id="delivery" required>

<label>Delivery Stairs</label>
<select id="stairsDelivery">
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<label>Additional Information</label>
<textarea id="info"></textarea>

<button type="submit" id="quoteBtn">Get My Instant Quote</button>
<button type="button" id="whatsappBtn">Book via WhatsApp</button>
<button type="button" id="emailBtn">Book via Email</button>

</form>

<div id="result" class="result"></div>

</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDex0iuSIdBsP21VWQJxws0dlpUj9heWac&libraries=places"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("UTKviVTwg9BJjYixe");

document.getElementById("moveDate").min = new Date().toISOString().slice(0,16);

let quoteCalculated=false;

window.onload=function(){

new google.maps.places.Autocomplete(document.getElementById('collection'));
new google.maps.places.Autocomplete(document.getElementById('via'));
new google.maps.places.Autocomplete(document.getElementById('delivery'));

}

document.getElementById("quoteForm").addEventListener("submit",function(e){

e.preventDefault();

calculateQuote();

});

function calculateQuote(){

let rate=parseFloat(document.getElementById("service").value);

let stairsCollection=parseInt(document.getElementById("stairsCollection").value);
let stairsVia=parseInt(document.getElementById("stairsVia").value);
let stairsDelivery=parseInt(document.getElementById("stairsDelivery").value);

let stairsTotal=stairsCollection+stairsVia+stairsDelivery;

let numMen=(rate===40?1:rate===70?2:rate===100?3:0);

let costStairs=stairsTotal*10*numMen;

const collection=document.getElementById("collection").value;
const via=document.getElementById("via").value;
const delivery=document.getElementById("delivery").value;

const segments=via?
[{origin:collection,destination:via},{origin:via,destination:delivery}]
:[{origin:collection,destination:delivery}];

let totalMeters=0,totalSeconds=0,processed=0;

segments.forEach(segment=>{

const serviceDM=new google.maps.DistanceMatrixService();

serviceDM.getDistanceMatrix({

origins:[segment.origin],
destinations:[segment.destination],
travelMode:google.maps.TravelMode.DRIVING

},

function(response,status){

if(status!=="OK"){alert("Distance error");return;}

totalMeters+=response.rows[0].elements[0].distance.value;
totalSeconds+=response.rows[0].elements[0].duration.value;

processed++;

if(processed===segments.length){

processDistance(totalMeters,totalSeconds);

}

});

});

function processDistance(totalMeters,totalSeconds){

const miles=totalMeters/1609.34;
const costMiles=miles*1.5;

let loadingTime=30*60;

const stairsTime=stairsTotal*10*60;

let estimatedSeconds=totalSeconds+loadingTime+stairsTime;

let estimatedHours=estimatedSeconds/3600;
let roundedHours=Math.ceil(estimatedHours*2)/2;

if(roundedHours<2)roundedHours=2;

const costHours=roundedHours*rate;

let total=costHours+costMiles+costStairs;

let congestion=0;

const zones=["EC","WC","W1","SW1","SE1"];

zones.forEach(zone=>{
if(collection.toUpperCase().includes(zone)||delivery.toUpperCase().includes(zone)){
congestion=18;
}
});

total+=congestion;

document.getElementById("result").innerHTML=

`Estimated working time: ${roundedHours}h

Distance: ${miles.toFixed(2)} miles

Cost hours: £${costHours.toFixed(2)}
Cost miles: £${costMiles.toFixed(2)}
Cost stairs: £${costStairs.toFixed(2)}
Congestion charge: £${congestion}

TOTAL: £${total.toFixed(2)}`;

quoteCalculated=true;

}

}

document.getElementById("whatsappBtn").onclick=function(){

if(!quoteCalculated){alert("Please calculate quote first");return;}

let msg=`Fast Any Moves Booking

Name: ${document.getElementById("name").value}
Phone: ${document.getElementById("phone").value}
Email: ${document.getElementById("email").value}

Collection: ${document.getElementById("collection").value}
Delivery: ${document.getElementById("delivery").value}

${document.getElementById("result").innerText}`;

window.open("https://wa.me/447846769519?text="+encodeURIComponent(msg));

}

document.getElementById("emailBtn").onclick=function(){

if(!quoteCalculated){alert("Please calculate quote first");return;}

emailjs.send("service_1e9jyk9","template_0tbv6y9",{

name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
quote_breakdown:document.getElementById("result").innerText

}).then(()=>{

alert("Booking request sent successfully!");

});

}

</script>

</body>
</html>
