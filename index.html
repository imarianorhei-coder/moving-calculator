<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast Any Moves Ltd – Instant Moving Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: 'Montserrat', Arial, sans-serif; background:#f0f2f5; margin:0; }
.container { max-width: 800px; margin:40px auto; background:#fff; padding:30px; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.12);}
h1 { text-align:center; color:#0B1F3A; font-size:28px; margin-bottom:5px;}
h2 { text-align:center; font-weight:400; color:#3A3A3A; font-size:18px; margin-bottom:25px;}
label { font-weight:600; display:block; margin-top:15px; color:#333;}
input, select, textarea { width:100%; padding:12px; margin-top:5px; border-radius:6px; border:1px solid #ccc; font-size:14px;}
input.invalid { border-color:red;}
textarea { resize:vertical;}
button { width:100%; padding:15px; margin-top:20px; border:none; border-radius:6px; font-size:16px; font-weight:600; cursor:pointer; transition:0.3s;}
#quoteBtn { background:#0B1F3A; color:#fff;} 
#quoteBtn:hover { background:#094170;}
#whatsappBtn { background:#25D366; color:#fff; margin-top:10px;}
#whatsappBtn:hover { background:#1DA851;}
#emailBtn { background:#007bff; color:#fff; margin-top:10px;}
#emailBtn:hover { background:#0056b3;}
.result { margin-top:25px; padding:20px; background:#eef5ff; border-radius:8px; font-size:14px; white-space:pre-line; line-height:1.5; color:#0B1F3A;}
</style>
</head>
<body>
<div class="container">
<h1>Fast Any Moves Ltd</h1>
<h2>Instant Moving Quote – Help us serve you better</h2>

<form id="quoteForm">
<label>Name *</label><input type="text" id="name" required>
<label>Phone *</label><input type="text" id="phone" required>
<label>Email *</label><input type="email" id="email" required>
<label>Move Date *</label><input type="datetime-local" id="moveDate" required>

<label>Service *</label>
<select id="service" required>
  <option value="">Select</option>
  <option value="35">No help required + Medium Van</option>
  <option value="40">1 Man + Medium Van</option>
  <option value="70">2 Men + Medium Van</option>
  <option value="100">3 Men + Medium Van</option>
</select>

<h3>Collection Address *</h3>
<label>Number/Name</label><input type="text" id="collection_num" required>
<label>Street</label><input type="text" id="collection_street" required>
<label>City</label><input type="text" id="collection_city" required>
<label>Postcode</label><input type="text" id="collection_postcode" required>
<label>Stairs</label>
<select id="stairsCollection">
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<h3>Via Address (optional)</h3>
<label>Number/Name</label><input type="text" id="via_num">
<label>Street</label><input type="text" id="via_street">
<label>City</label><input type="text" id="via_city">
<label>Postcode</label><input type="text" id="via_postcode">
<label>Stairs</label>
<select id="stairsVia">
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<h3>Delivery Address *</h3>
<label>Number/Name</label><input type="text" id="delivery_num" required>
<label>Street</label><input type="text" id="delivery_street" required>
<label>City</label><input type="text" id="delivery_city" required>
<label>Postcode</label><input type="text" id="delivery_postcode" required>
<label>Stairs</label>
<select id="stairsDelivery">
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<label>Additional Information</label><textarea id="info"></textarea>

<button type="submit" id="quoteBtn">Get My Instant Quote</button>
<button type="button" id="whatsappBtn">Send via WhatsApp</button>
<button type="button" id="emailBtn">Send via Email</button>
</form>

<div id="result" class="result"></div>
</div>

<!-- Google API Key -->
<script src="https://maps.googleapis.com/maps/api/js?key=&AIzaSyDex0iuSIdBsP21VWQJxws0dlpUj9heWac libraries=places" async defer></script>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("YOUR_EMAILJS_PUBLIC_KEY"); // doar daca vrei sa folosesti EmailJS

document.getElementById("moveDate").min = new Date().toISOString().slice(0,16);

function isFieldFilled(input){ return input.value.trim().length>0; }
function getFullAddress(num, street, city, postcode){ return num.trim()+", "+street.trim()+", "+city.trim()+", "+postcode.trim()+", UK"; }

document.getElementById("quoteForm").addEventListener("submit", function(e){
e.preventDefault();

// validare completă
let errors = [];
['collection_num','collection_street','collection_city','collection_postcode',
'delivery_num','delivery_street','delivery_city','delivery_postcode'].forEach(id=>{
if(!isFieldFilled(document.getElementById(id))){document.getElementById(id).classList.add('invalid'); errors.push(id+" incomplete");}});
let viaFilled = ['via_num','via_street','via_city','via_postcode'].some(id=>isFieldFilled(document.getElementById(id)));
if(viaFilled){
['via_num','via_street','via_city','via_postcode'].forEach(id=>{
if(!isFieldFilled(document.getElementById(id))){document.getElementById(id).classList.add('invalid'); errors.push(id+" incomplete");}});
}
if(errors.length>0){alert(errors.join("\n")); return;}

const collectionFull = getFullAddress(document.getElementById('collection_num').value,
document.getElementById('collection_street').value,
document.getElementById('collection_city').value,
document.getElementById('collection_postcode').value);
const viaFull = viaFilled ? getFullAddress(document.getElementById('via_num').value,
document.getElementById('via_street').value,
document.getElementById('via_city').value,
document.getElementById('via_postcode').value) : null;
const deliveryFull = getFullAddress(document.getElementById('delivery_num').value,
document.getElementById('delivery_street').value,
document.getElementById('delivery_city').value,
document.getElementById('delivery_postcode').value);

const segments = viaFull ? [{origin:collectionFull,destination:viaFull},{origin:viaFull,destination:deliveryFull}] : [{origin:collectionFull,destination:deliveryFull}];

let totalMeters=0,totalSeconds=0,processed=0;
segments.forEach(segment=>{
const serviceDM = new google.maps.DistanceMatrixService();
serviceDM.getDistanceMatrix({origins:[segment.origin], destinations:[segment.destination], travelMode: google.maps.TravelMode.DRIVING}, function(response,status){
if(status!=="OK"){alert("Distance calculation error"); return;}
totalMeters += response.rows[0].elements[0].distance.value;
totalSeconds += response.rows[0].elements[0].duration.value;
processed++;
if(processed===segments.length){
let rate=parseFloat(document.getElementById("service").value);
let stairsCollection=parseInt(document.getElementById("stairsCollection").value);
let stairsVia=parseInt(document.getElementById("stairsVia").value);
let stairsDelivery=parseInt(document.getElementById("stairsDelivery").value);
let stairsTotal=stairsCollection+stairsVia+stairsDelivery;
let numMen=(rate===40?1:rate===70?2:rate===100?3:0);
let costStairs=rate!==35?stairsTotal*10*numMen:0;

let miles=totalMeters/1609.34;
let costMiles=miles*1.5;
let loadingTime=30*60;
let stairsTime=stairsTotal*10*60;
let estimatedSeconds=totalSeconds+loadingTime+stairsTime;
let estimatedHours=estimatedSeconds/3600;
let roundedHours=Math.ceil(estimatedHours*2)/2;
if(roundedHours<2) roundedHours=2;
let costHours=roundedHours*rate;
let total=costHours+costMiles+costStairs;

let finalHours=Math.floor(estimatedSeconds/3600);
let finalMinutes=Math.round((estimatedSeconds%3600)/60);

let breakdown="Estimated working time: "+finalHours+"h "+finalMinutes+"m\n"+
"Hours charged (rounded): "+roundedHours+"\n"+
"Cost hours: £"+costHours.toFixed(2)+"\n"+
"Miles: "+miles.toFixed(2)+"\n"+
"Cost miles: £"+costMiles.toFixed(2)+"\n"+
"Collection Stairs: "+stairsCollection+"\n"+
"Via Stairs: "+stairsVia+"\n"+
"Delivery Stairs: "+stairsDelivery+"\n"+
"Cost stairs: £"+costStairs.toFixed(2)+"\n"+
"TOTAL: £"+total.toFixed(2);

document.getElementById("result").innerHTML=breakdown.replace(/\n/g,"<br>");

// aici poti adauga codul pentru WhatsApp si Email
}});});
});
</script>
