<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast Any Moves Ltd – Instant Moving Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f7fb;
margin:0;
}

.container{
max-width:800px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

h1{
text-align:center;
color:#0B4DBA;
margin-bottom:5px;
}

h2{
text-align:center;
font-weight:400;
color:#555;
margin-bottom:25px;
}

label{
font-weight:600;
display:block;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:6px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

#quoteBtn{background:#0B4DBA;color:white;}
#bookBtn{background:#ff9800;color:white;}
#whatsappBtn{background:#25D366;color:white;}
#emailBtn{background:#007bff;color:white;}

.result{
margin-top:25px;
padding:20px;
background:#eef5ff;
border-radius:8px;
white-space:pre-line;
line-height:1.5;
}

#map{
height:300px;
margin-top:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Fast Any Moves Ltd</h1>
<h2>Instant Moving Quote – London Man & Van</h2>

<form id="quoteForm">

<label>Name *</label>
<input type="text" id="name" required>

<label>Phone *</label>
<input type="text" id="phone" required>

<label>Email *</label>
<input type="email" id="email" required>

<label>Move Date *</label>
<input type="datetime-local" id="moveDate" required>

<label>Service *</label>
<select id="service" required>
<option value="">Select</option>
<option value="35">No help required + Medium Van</option>
<option value="40">1 Man + Medium Van</option>
<option value="70">2 Men + Medium Van</option>
<option value="100">3 Men + Medium Van</option>
</select>

<label>Collection Address *</label>
<input type="text" id="collection" required>

<label>Collection Stairs</label>
<select id="stairsCollection">
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<label>Delivery Address *</label>
<input type="text" id="delivery" required>

<label>Delivery Stairs</label>
<select id="stairsDelivery">
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<label>Additional Information</label>
<textarea id="info"></textarea>

<button type="submit" id="quoteBtn">Get My Instant Quote</button>
<button type="button" id="bookBtn">Book This Move</button>
<button type="button" id="whatsappBtn">Send via WhatsApp</button>
<button type="button" id="emailBtn">Send via Email</button>

</form>

<div id="result" class="result"></div>

<div id="map"></div>

</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDex0iuSIdBsP21VWQJxws0dlpUj9heWac&libraries=places"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("UTKviVTwg9BJjYixe");

let map;
let directionsService;
let directionsRenderer;

window.onload=function(){

new google.maps.places.Autocomplete(document.getElementById('collection'));
new google.maps.places.Autocomplete(document.getElementById('delivery'));

map=new google.maps.Map(document.getElementById("map"),{
zoom:7,
center:{lat:51.5074,lng:-0.1278}
});

directionsService=new google.maps.DirectionsService();
directionsRenderer=new google.maps.DirectionsRenderer();

directionsRenderer.setMap(map);

}

document.getElementById("quoteForm").addEventListener("submit",function(e){

e.preventDefault();

calculateQuote();

});

function calculateQuote(){

let rate=parseFloat(document.getElementById("service").value);

let stairsCollection=parseInt(document.getElementById("stairsCollection").value);
let stairsDelivery=parseInt(document.getElementById("stairsDelivery").value);

let stairsTotal=stairsCollection+stairsDelivery;

let numMen=(rate===40?1:rate===70?2:rate===100?3:0);

let costStairs=stairsTotal*10*numMen;

const collection=document.getElementById("collection").value;
const delivery=document.getElementById("delivery").value;

const serviceDM=new google.maps.DistanceMatrixService();

serviceDM.getDistanceMatrix({

origins:[collection],
destinations:[delivery],
travelMode:google.maps.TravelMode.DRIVING

},

function(response,status){

if(status!=="OK"){alert("Distance error");return;}

const meters=response.rows[0].elements[0].distance.value;
const seconds=response.rows[0].elements[0].duration.value;

processDistance(meters,seconds);

});

directionsService.route({

origin:collection,
destination:delivery,
travelMode:'DRIVING'

},function(result,status){

if(status==="OK"){

directionsRenderer.setDirections(result);

}

});

function processDistance(totalMeters,totalSeconds){

const miles=totalMeters/1609.34;

const costMiles=miles*1.5;

let loadingTime=30*60;

if(rate===35) loadingTime=40*60;
if(rate===40) loadingTime=30*60;
if(rate===70) loadingTime=20*60;
if(rate===100) loadingTime=15*60;

const stairsTime=stairsTotal*10*60;

const estimatedSeconds=totalSeconds+loadingTime+stairsTime;

let estimatedHours=estimatedSeconds/3600;

let roundedHours=Math.ceil(estimatedHours*2)/2;

if(roundedHours<2)roundedHours=2;

const costHours=roundedHours*rate;

let total=costHours+costMiles+costStairs;

let congestion=0;

function inCongestionZone(lat,lng){

return(

lat>51.50 &&
lat<51.53 &&
lng>-0.15 &&
lng<-0.07

);

}

const geocoder=new google.maps.Geocoder();

geocoder.geocode({address:collection},function(res,status){

if(status==="OK"){

const lat=res[0].geometry.location.lat();
const lng=res[0].geometry.location.lng();

if(inCongestionZone(lat,lng)){

congestion=18;
total+=18;

}

}

showResult();

});

function showResult(){

document.getElementById("result").innerHTML=

`Estimated working time: ${Math.floor(estimatedSeconds/3600)}h ${Math.round((estimatedSeconds%3600)/60)}m

Hours charged: ${roundedHours}

Distance: ${miles.toFixed(2)} miles

Cost hours: £${costHours.toFixed(2)}
Cost miles: £${costMiles.toFixed(2)}
Cost stairs: £${costStairs.toFixed(2)}
Congestion charge: £${congestion}

TOTAL: £${total.toFixed(2)}`;

}

}

}

document.getElementById("whatsappBtn").onclick=function(){

let msg=`Fast Any Moves Quote

Name: ${name.value}
Phone: ${phone.value}

Collection: ${collection.value}
Delivery: ${delivery.value}

${result.innerText}`;

window.open("https://wa.me/447846769519?text="+encodeURIComponent(msg));

}

document.getElementById("bookBtn").onclick=function(){

let msg=`Booking Request – Fast Any Moves

Name: ${name.value}
Phone: ${phone.value}

Collection: ${collection.value}
Delivery: ${delivery.value}

${result.innerText}`;

window.open("https://wa.me/447846769519?text="+encodeURIComponent(msg));

}

</script>

</body>
</html>
