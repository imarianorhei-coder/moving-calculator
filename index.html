<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast Any Moves Ltd – Instant Moving Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f7fb;
margin:0;
}

.container{
max-width:800px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

h1{
text-align:center;
color:#0B4DBA;
}

h2{
text-align:center;
font-weight:400;
color:#555;
margin-bottom:25px;
}

label{
font-weight:600;
display:block;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

input:invalid,select:invalid,textarea:invalid{
border:2px solid #e74c3c;
background:#fff6f6;
}

button{
width:100%;
padding:15px;
margin-top:8px;
border:none;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

#quoteBtn{background:#0B4DBA;color:white;}
#whatsappBtn{background:#25D366;color:white;}
#emailBtn{background:#007bff;color:white;}

.result{
margin-top:25px;
padding:20px;
background:#eef5ff;
border-radius:8px;
white-space:pre-line;
}

</style>
</head>

<body>

<div class="container">

<h1>Fast Any Moves Ltd</h1>
<h2>Instant Moving Quote – London Man & Van</h2>

<form id="quoteForm">

<label>Name *</label>
<input type="text" id="name" required>

<label>Email *</label>
<input type="email" id="email" required>

<label>Phone *</label>
<input type="text" id="phone" required>

<label>Moving Date & Time *</label>
<input type="datetime-local" id="moveDate" required>

<label>Do you need help with loading and unloading? *</label>
<select id="service" required>
<option value="">Select</option>
<option value="35">No help required + Medium Van</option>
<option value="40">1 Man + Medium Van</option>
<option value="70">2 Men + Medium Van</option>
<option value="100">3 Men + Medium Van</option>
</select>

<label>Collection Address *</label>
<input type="text" id="collection" required>

<label>Collection Stairs *</label>
<select id="stairsCollection" required>
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<label>Via Address (optional)</label>
<input type="text" id="via">

<label>Via Stairs</label>
<select id="stairsVia">
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<label>Delivery Address *</label>
<input type="text" id="delivery" required>

<label>Delivery Stairs *</label>
<select id="stairsDelivery" required>
<option value="0">Ground floor / Lift</option>
<option value="1">1 Flight</option>
<option value="2">2 Flights</option>
<option value="3">3 Flights</option>
<option value="4">4 Flights</option>
</select>

<label>Additional Information</label>
<textarea id="info"></textarea>

<button type="submit" id="quoteBtn">Get My Instant Quote</button>

</form>

<div id="result" class="result"></div>

<div id="bookingButtons" style="display:none;margin-top:10px;">
<button id="whatsappBtn">Book via WhatsApp</button>
<button id="emailBtn">Book via Email</button>
</div>

</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDex0iuSIdBsP21VWQJxws0dlpUj9heWac&libraries=places"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("UTKviVTwg9BJjYixe");

document.getElementById("moveDate").min=new Date().toISOString().slice(0,16);

let quoteCalculated=false;

window.onload=function(){
new google.maps.places.Autocomplete(document.getElementById('collection'));
new google.maps.places.Autocomplete(document.getElementById('via'));
new google.maps.places.Autocomplete(document.getElementById('delivery'));
}

document.getElementById("quoteForm").addEventListener("submit",function(e){
e.preventDefault();
calculateQuote();
});

function calculateQuote(){

let rate=parseFloat(service.value);

let stairsTotal=parseInt(stairsCollection.value)+parseInt(stairsVia.value)+parseInt(stairsDelivery.value);

let men=(rate===40?1:rate===70?2:rate===100?3:0);

let costStairs=stairsTotal*10*men;

const serviceDM=new google.maps.DistanceMatrixService();

serviceDM.getDistanceMatrix({
origins:[collection.value],
destinations:[delivery.value],
travelMode:"DRIVING"
},function(response){

let meters=response.rows[0].elements[0].distance.value;
let seconds=response.rows[0].elements[0].duration.value;

let miles=meters/1609.34;
let costMiles=miles*1.5;

let loadingTime=30*60;
let stairsTime=stairsTotal*10*60;

let estimatedSeconds=seconds+loadingTime+stairsTime;

let hours=Math.ceil((estimatedSeconds/3600)*2)/2;
if(hours<2)hours=2;

let costHours=hours*rate;

let congestion=0;

["EC","WC","W1","SW1","SE1"].forEach(z=>{
if(collection.value.toUpperCase().includes(z)||delivery.value.toUpperCase().includes(z)){
congestion=18;
}
});

let total=costHours+costMiles+costStairs+congestion;

let quote=

`Estimated working time: ${hours}h

Distance: ${miles.toFixed(2)} miles

Cost hours: £${costHours.toFixed(2)}
Cost miles: £${costMiles.toFixed(2)}
Cost stairs: £${costStairs.toFixed(2)}
Congestion charge: £${congestion}

TOTAL: £${total.toFixed(2)}

--------------------------------

This is an estimated quote based on the information provided.

If extra time is needed, half-hour rates apply.

To confirm your booking please contact us using one of the options below.`;

result.innerText=quote;

bookingButtons.style.display="block";

quoteCalculated=true;

});

}

document.getElementById("whatsappBtn").onclick=function(){

let clean=result.innerText.replace(
"To confirm your booking please contact us using one of the options below.",""
);

let msg=`Fast Any Moves Booking

Name: ${name.value}
Phone: ${phone.value}
Email: ${email.value}

Collection: ${collection.value}
Delivery: ${delivery.value}

${clean}`;

window.open("https://wa.me/447846769519?text="+encodeURIComponent(msg));

result.innerText=clean;

}

document.getElementById("emailBtn").onclick=function(){

if(!quoteCalculated){
alert("Please calculate the quote first.");
return;
}

let clean=result.innerText.replace(
"To confirm your booking please contact us using one of the options below.",""
);

let params={
name:name.value,
phone:phone.value,
email:email.value,
collection:collection.value,
delivery:delivery.value,
quote_breakdown:clean
};

emailjs.send("service_1e9jyk9","template_0tbv6y9",params)
.then(function(){

emailjs.send("service_1e9jyk9","template_8qxabwq",params);

alert("Email sent successfully");

result.innerText=clean;

});

}

</script>

</body>
</html>
